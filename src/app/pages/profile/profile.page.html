<ion-content>

  <div class="container">

    <div class="heading">
      <img (click)="back()" [src]="lAImg">
      <h3>Profile</h3>
    </div>

    <div class="profile">
      <div>
        <p>Name</p>
        <h3>{{currentUser?.displayName}}</h3>
      </div>
      <div>
        <div>
          <p>Phone</p>
          <h3>{{currentUser?.username}}</h3>
        </div>
        <ion-icon (click)="copyPhoneNumber()" name="copy-outline" slot="end" color="primary"></ion-icon>
      </div>
      <div>
        <p>level</p>
        <h3>{{currentUser?.level}}</h3>
      </div>
      <div>
        <p>years of experience</p>
        <h3>{{currentUser?.experienceYears}} years</h3>
      </div>
      <div>
        <p>location</p>
        <h3>{{currentUser?.address}}</h3>
      </div>


    </div>


  </div>


</ion-content>
